<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort the Decisions — Ensemble Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --ink:   #1C2733;
            --ink-2: #576473;
            --ink-3: #94A3B5;
            --paper: #FDFAF6;
            --rule:  #E0D8CF;
            --c1: #2A6049;
            --c2: #1E4B7A;
            --c3: #B85A1A;
            --c5: #A3291F;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #e8e2d9;
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── STICKY HEADER ── */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--ink);
        }

        .top-bar-inner {
            max-width: 600px;
            margin: 0 auto;
            padding: 12px 16px 10px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .top-bar-title {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-weight: 400;
            color: white;
        }

        .top-bar-progress {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
        }

        .progress-track { height: 3px; background: rgba(255,255,255,0.1); }
        .progress-fill  { height: 3px; background: var(--c1); width: 0; transition: width 0.35s ease; }

        /* ── MAIN ── */
        .main {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 14px 100px;
        }

        /* ── DECISION CARD ── */
        .card {
            background: white;
            border: 1.5px solid var(--rule);
            border-radius: 8px;
            padding: 14px 14px 12px;
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .card.done {
            border-color: rgba(0,0,0,0.06);
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }

        .card-name {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 11.5px;
            color: var(--ink-3);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        /* ── CATEGORY BUTTONS ── */
        .cat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .cat-btn {
            padding: 8px 6px;
            border-radius: 5px;
            border: 1.5px solid;
            font-family: 'Inter', sans-serif;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 0.2px;
            cursor: pointer;
            text-align: center;
            line-height: 1.25;
            transition: background 0.15s, color 0.15s;
            -webkit-tap-highlight-color: transparent;
            background: white;
            -webkit-user-select: none;
            user-select: none;
        }

        .cat-btn[data-cat="collective"]   { border-color: var(--c1); color: var(--c1); }
        .cat-btn[data-cat="consultative"] { border-color: var(--c2); color: var(--c2); }
        .cat-btn[data-cat="delegated"]    { border-color: var(--c3); color: var(--c3); }
        .cat-btn[data-cat="director_led"] { border-color: var(--c5); color: var(--c5); }

        .cat-btn[data-cat="collective"].sel   { background: var(--c1); color: white; }
        .cat-btn[data-cat="consultative"].sel { background: var(--c2); color: white; }
        .cat-btn[data-cat="delegated"].sel    { background: var(--c3); color: white; }
        .cat-btn[data-cat="director_led"].sel { background: var(--c5); color: white; }

        /* ── SELECTION LABEL ── */
        .sel-label {
            display: none;
            margin-top: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            text-align: center;
            padding: 3px 10px;
            border-radius: 3px;
            color: white;
        }

        .card.done .sel-label { display: block; }

        /* ── DONE FOOTER ── */
        .done-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--c1);
            color: white;
            text-align: center;
            padding: 16px 20px;
            transform: translateY(100%);
            transition: transform 0.35s ease;
            z-index: 100;
        }

        .done-footer.show { transform: translateY(0); }

        .done-footer h2 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 3px;
        }

        .done-footer p {
            font-size: 11.5px;
            opacity: 0.7;
        }

        /* ── OFFLINE NOTICE ── */
        .offline-notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 11.5px;
            color: #856404;
            line-height: 1.5;
            display: none;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-inner">
        <span class="top-bar-title">Sort the decisions</span>
        <span class="top-bar-progress" id="prog-text">0 / 10</span>
    </div>
    <div class="progress-track">
        <div class="progress-fill" id="prog-fill"></div>
    </div>
</div>

<div class="main">
    <div class="offline-notice" id="offline-notice">
        Firebase is not configured — your votes will not be saved. See setup instructions in the HTML file.
    </div>
    <div id="cards"></div>
</div>

<div class="done-footer" id="done-footer">
    <h2>You're done.</h2>
    <p>Your answers are saved. Watch the screen for results.</p>
</div>

<script>
    // ── FIREBASE CONFIG ──────────────────────────────────────────────────────
    // 1. Go to https://console.firebase.google.com
    // 2. Create a project → Add web app → copy the firebaseConfig object below
    // 3. Go to Realtime Database → Rules and set:
    //    { "rules": { ".read": true, ".write": true } }
    // 4. Replace all "REPLACE" values below with your project's values
    const firebaseConfig = {
        apiKey:            "AIzaSyDDln74E24sGerHQCgpL7kSsthpF-H1u8U",
        authDomain:        "chamber-workshop-1.firebaseapp.com",
        databaseURL:       "https://chamber-workshop-1-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:         "chamber-workshop-1",
        storageBucket:     "chamber-workshop-1.firebasestorage.app",
        messagingSenderId: "423187424700",
        appId:             "1:423187424700:web:842d4922ce6c4fd71777b9"
    };

    let db = null;
    try {
        if (firebaseConfig.apiKey !== "REPLACE") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } else {
            document.getElementById('offline-notice').style.display = 'block';
        }
    } catch(e) {
        document.getElementById('offline-notice').style.display = 'block';
        console.warn('Firebase init failed:', e.message);
    }

    // ── SESSION + DEVICE ─────────────────────────────────────────────────────
    // Add ?session=yourcode to the URL to separate different workshop runs.
    // Use the same session code on the presentation URL too.
    const session = new URLSearchParams(location.search).get('session')
                  || new Date().toISOString().split('T')[0];

    function getPid() {
        let id = localStorage.getItem('vc_pid');
        if (!id) {
            id = 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            localStorage.setItem('vc_pid', id);
        }
        return id;
    }
    const pid = getPid();

    // ── DATA ─────────────────────────────────────────────────────────────────
    const DECISIONS = [
        { key: 'repertoire',     name: 'Repertoire selection',  desc: 'What pieces to perform, and why' },
        { key: 'prog_order',     name: 'Programming order',     desc: 'Sequence of works in a concert or set' },
        { key: 'interpretation', name: 'Interpretation',        desc: 'Tempo, phrasing, dynamics, diction, style' },
        { key: 'roles',          name: 'Ensemble roles',        desc: 'Who leads sections or cues entries' },
        { key: 'rehearsal',      name: 'Rehearsal priorities',  desc: 'What to focus on and what can wait' },
        { key: 'scheduling',     name: 'Scheduling',            desc: 'Rehearsal times, call times, deadlines' },
        { key: 'format',         name: 'Performance format',    desc: 'Formation, staging, movement, use of space' },
        { key: 'comms',          name: 'Communication norms',   desc: 'How feedback is given and disagreement handled' },
        { key: 'membership',     name: 'Membership',            desc: 'Who joins, covers absences, substitutes' },
        { key: 'docs',           name: 'Documentation',         desc: 'Scores, notes, shared rehearsal records' },
    ];

    const CATS = [
        { key: 'collective',   label: 'Collective',   color: '#2A6049' },
        { key: 'consultative', label: 'Consultative', color: '#1E4B7A' },
        { key: 'delegated',    label: 'Delegated',    color: '#B85A1A' },
        { key: 'director_led', label: 'Director-led', color: '#A3291F' },
    ];

    // ── STATE ─────────────────────────────────────────────────────────────────
    const local = {};
    let sortedCount = 0;

    // ── RENDER CARDS ─────────────────────────────────────────────────────────
    const cardsEl = document.getElementById('cards');

    DECISIONS.forEach(d => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'c-' + d.key;

        const btns = CATS.map(c =>
            `<button class="cat-btn" data-key="${d.key}" data-cat="${c.key}">${c.label}</button>`
        ).join('');

        card.innerHTML = `
            <div class="card-name">${d.name}</div>
            <div class="card-desc">${d.desc}</div>
            <div class="cat-row">${btns}</div>
            <div class="sel-label" id="lbl-${d.key}"></div>
        `;
        cardsEl.appendChild(card);
    });

    // ── VOTE HANDLER ─────────────────────────────────────────────────────────
    cardsEl.addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;

        const key = btn.dataset.key;
        const cat = btn.dataset.cat;
        const isNew = !local[key];

        local[key] = cat;

        if (isNew) {
            sortedCount++;
            updateProgress();
        }

        // Update button states
        const card = document.getElementById('c-' + key);
        card.querySelectorAll('.cat-btn').forEach(b => {
            b.classList.toggle('sel', b.dataset.cat === cat);
        });

        // Update label
        const catObj = CATS.find(c => c.key === cat);
        const lbl = document.getElementById('lbl-' + key);
        lbl.textContent = catObj.label;
        lbl.style.background = catObj.color;
        card.classList.add('done');

        // Write to Firebase
        if (db) db.ref(`votes/${session}/${pid}/${key}`).set(cat);

        if (sortedCount === DECISIONS.length) {
            document.getElementById('done-footer').classList.add('show');
        }
    });

    function updateProgress() {
        const pct = (sortedCount / DECISIONS.length) * 100;
        document.getElementById('prog-fill').style.width = pct + '%';
        document.getElementById('prog-text').textContent = sortedCount + ' / ' + DECISIONS.length;
    }

    // ── RESTORE PREVIOUS SESSION ─────────────────────────────────────────────
    if (db) {
        db.ref(`votes/${session}/${pid}`).once('value', snap => {
            const saved = snap.val();
            if (!saved) return;
            Object.entries(saved).forEach(([key, cat]) => {
                local[key] = cat;
                sortedCount++;

                const card = document.getElementById('c-' + key);
                if (!card) return;
                card.querySelectorAll('.cat-btn').forEach(b => {
                    b.classList.toggle('sel', b.dataset.cat === cat);
                });
                card.classList.add('done');

                const catObj = CATS.find(c => c.key === cat);
                const lbl = document.getElementById('lbl-' + key);
                if (catObj) { lbl.textContent = catObj.label; lbl.style.background = catObj.color; }
            });

            updateProgress();
            if (sortedCount === DECISIONS.length) {
                document.getElementById('done-footer').classList.add('show');
            }
        });
    }
</script>
</body>
</html>
